about_content: | # this will include new lines to allow paragraphs
  I am a research scientist in KRAFTON AI's Physical AI team. Previously, I was a postdoctoral researcher in the Urban Robotics Lab., KAIST, where I also obtained my Ph.D in the [School of Electrical Engineering](https://ee.kaist.ac.kr/) and [Robotics Program](https://rp.kaist.ac.kr/), [KAIST](https://kaist.ac.kr/kr/), working with Prof. [Hyun Myung](https://urobot.kaist.ac.kr/url_teams/prof-hyunmyung/).
  My current research focuses on control, reinforcement learning, and the interplay between them for highly resilient legged robotics applications.

